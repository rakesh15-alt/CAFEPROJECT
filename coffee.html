<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HELL CAFE | Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:url('') center/cover fixed no-repeat; /* PASTE BACKGROUND IMAGE HERE */
  color:#fff;
}

.overlay{
  background:rgba(0,0,0,.85);
  min-height:100vh;
  padding:90px 50px;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:10px 22px;
  border:none;
  border-radius:25px;
  background:#c97c5d;
  color:#000;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 25px rgba(201,124,93,.9);
  transition:.3s;
  z-index:999;
}
.back-btn:hover{
  box-shadow:0 0 45px #ff9f68;
}

/* TITLE */
h1{
  text-align:center;
  font-size:42px;
  margin-bottom:60px;
  color:#c97c5d;
  text-shadow:0 0 30px #c97c5d;
}

/* GRID */
.coffee-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:40px;
}

/* CARD */
.coffee-card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 20px 40px rgba(0,0,0,.7);
  transition:.4s;
}
.coffee-card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 30px 60px rgba(201,124,93,.8);
}

.coffee-card img{
  width:100%;
  height:340px;
  object-fit:cover;
}

/* OVERLAY INFO */
.coffee-info{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
}

.coffee-info h3{
  font-size:22px;
  margin-bottom:5px;
}

.coffee-info span{
  color:#ff9f68;
  font-weight:600;
  text-shadow:0 0 15px #ff9f68;
}

/* MOBILE */
@media(max-width:600px){
  .overlay{padding:80px 20px}
  h1{font-size:32px}
}
@media (max-width: 768px){

  body{
    background-attachment:scroll;
  }

  .overlay,
  .section{
    padding:60px 20px;
  }

  h1{
    font-size:30px;
  }

  .header{
    padding:15px 20px;
  }

  .back-btn{
    padding:8px 16px;
    font-size:14px;
  }

  .menu-card,
  .card{
    border-radius:16px;
  }
}

a, button{
  -webkit-tap-highlight-color:transparent;
}  
html{
  scroll-behavior:smooth;
}
 img{
  max-width:100%;
  display:block;
}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="overlay">
  <h1>☕ COFFEE MENU</h1>

  <div class="coffee-grid">

    <div class="coffee-card">
      <img src="images/coffee1.jpeg">
      <div class="coffee-info">
        <h3>Espresso</h3>
        <span>₹120</span>
      </div>
    </div>

    <div class="coffee-card">
      <img src="images/coffee2.jpeg">
      <div class="coffee-info">
        <h3>Cappuccino</h3>
        <span>₹180</span>
      </div>
    </div>

    <div class="coffee-card">
      <img src="images/coffee3.jpeg">
      <div class="coffee-info">
        <h3>Latte</h3>
        <span>₹200</span>
      </div>
    </div>

    <div class="coffee-card">
      <img src="images/coffee4.jpeg">
      <div class="coffee-info">
        <h3>Mocha</h3>
        <span>₹220</span>
      </div>
    </div>
     <div class="coffee-card">
      <img src="images/coffee5.jpeg">
      <div class="coffee-info">
        <h3>Hellfire Espresso</h3>
        <span>₹190</span>
      </div>
    </div>

    <div class="coffee-card">
      <img src="images/coffee6.jpeg">
      <div class="coffee-info">
        <h3>Dark Roast Americano</h3>
        <span>₹180</span>
      </div>
    </div>

    <div class="coffee-card">
      <img src="images/coffee7.jpeg">
      <div class="coffee-info">
        <h3>Velvet Cappuccino</h3>
        <span>₹200</span>
      </div>
    </div>
     <div class="coffee-card">
      <img src="images/coffee8.jpeg">
      <div class="coffee-info">
        <h3>Midnight Mocha</h3>
        <span>₹120</span>
      </div>
    </div>

    <div class="coffee-card">
      <img src="images/coffee3.jpeg">
      <div class="coffee-info">
        <h3>Caramel Sin Latte</h3>
        <span>₹180</span>
      </div>
    </div>

    <div class="coffee-card">
      <img src="images/coffee2.jpeg">
      <div class="coffee-info">
        <h3>Hazelnut Heaven</h3>
        <span>₹200</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
